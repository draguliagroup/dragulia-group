<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragulia Group</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(180deg,#2b0000,#540000,#120000);
color:white;
text-align:center;
}

header{
padding:80px 20px;
}

.logo{
width:280px;
max-width:90%;
border-radius:10px;
box-shadow:0 0 35px rgba(255,215,0,.35);
}

h1{
margin-top:30px;
font-size:50px;
color:#FFD700;
}

p{
margin-top:15px;
font-size:20px;
color:#ddd;
}

.button{
display:inline-block;
margin-top:35px;
padding:15px 35px;
background:#c89b3c;
color:black;
text-decoration:none;
font-weight:bold;
border-radius:8px;
transition:.3s;
}

.button:hover{
background:#FFD700;
}

section{
padding:80px 20px;
}

.card{
background:rgba(255,255,255,.05);
max-width:900px;
margin:auto;
padding:35px;
border-radius:15px;
border:1px solid rgba(255,215,0,.3);
}

footer{
margin-top:80px;
padding:30px;
background:#150000;
color:#999;
}
</style>

</head>

<body>

<header>

<img src="logo.jpg" class="logo">

<h1>DRAGULIA GROUP</h1>

<p>Private Equity • Bitcoin • S&P 500</p>

<a class="button" href="#">Learn More</a>

</header>

<section>

<div class="card">

<h2 style="color:#FFD700;">About Us</h2>

<br>

<p>
Dragulia Group is a long-term investment company focused on
capital preservation and sustainable wealth creation through
Bitcoin and the S&P 500.
</p>

</div>

</section>

<footer>

© 2026 Dragulia Group. All Rights Reserved.

</footer>

</body>
</html>
